name: calendario-es
base: core24
version: '1.0'
summary: Spanish calendar with notes using GTK
description: |
  Calendar app with persistent notes and Spanish public holidays.
  Spanish public holidays are fetched from Nager Date on startup and cached locally.
license: MIT
source-code: https://github.com/SergioBertolinSG/Calendario
title: Calendario

grade: stable
confinement: strict

lint:
  ignore:
    - library:
        - usr/lib/**/libproxy.so*

apps:
  calendario-es:
    command: usr/bin/calendario
    extensions: [gnome]
    environment:
      LD_LIBRARY_PATH: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/libproxy:$LD_LIBRARY_PATH
    plugs:
      - network
    slots:
      - calendario-dbus

slots:
  calendario-dbus:
    interface: dbus
    bus: session
    name: io.github.SergioBertolinSG.Calendario

parts:
  calendario:
    plugin: make
    source: .
    build-packages:
      - gcc
      - make
      - pkg-config
      - libgtk-4-dev
      - libjson-glib-dev
    stage-packages:
      - curl
      - libjson-glib-1.0-0
      - libproxy1v5
    override-build: |
      make
      install -Dm755 calendario "$CRAFT_PART_INSTALL/usr/bin/calendario"
      install -Dm644 styles/calendario.css "$CRAFT_PART_INSTALL/usr/share/calendario/styles/calendario.css"
