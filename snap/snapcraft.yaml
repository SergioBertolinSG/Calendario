name: calendario
base: core24
version: '0.1'
summary: GTK calendar with notes
description: |
  Calendar app with persistent notes and Spanish public holidays.

grade: devel
confinement: strict

apps:
  calendario:
    command: usr/bin/calendario
    extensions: [gnome]
    plugs:
      - network

parts:
  calendario:
    plugin: make
    source: .
    build-packages:
      - gcc
      - make
      - pkg-config
      - libgtk-4-dev
    stage-packages:
      - curl
    override-build: |
      make
      install -Dm755 calendario "$CRAFT_PART_INSTALL/usr/bin/calendario"
      install -Dm644 styles/calendario.css "$CRAFT_PART_INSTALL/usr/share/calendario/styles/calendario.css"
